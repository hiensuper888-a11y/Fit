<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #18181b;
      color: #10b981;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .loader {
      border: 3px solid #3f3f46;
      border-top: 3px solid #10b981;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }
    .error-box {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #f87171;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      max-width: 400px;
      word-break: break-word;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader" id="loader"></div>
  <div id="status">Đang hoàn tất đăng nhập...</div>
  <div class="error-box" id="error-box"></div>

  <script>
    window.onload = function() {
      var statusEl = document.getElementById('status');
      var loaderEl = document.getElementById('loader');
      var errorBox = document.getElementById('error-box');

      function sendMessage(data) {
        // Try postMessage first
        if (window.opener) {
          window.opener.postMessage(data, '*');
          return true;
        }
        
        // Fallback to localStorage for cross-origin or lost opener
        try {
          localStorage.setItem('supabase_auth_callback', JSON.stringify({
            ...data,
            timestamp: Date.now()
          }));
          return true;
        } catch (e) {
          console.error('Failed to use localStorage fallback', e);
        }
        return false;
      }

      function showError(msg, desc) {
        loaderEl.style.display = 'none';
        statusEl.style.color = '#f87171';
        statusEl.innerText = 'Đăng nhập thất bại';
        errorBox.style.display = 'block';
        errorBox.innerHTML = '<strong>' + msg + '</strong><br/>' + (desc || 'Vui lòng kiểm tra lại cấu hình Supabase.');
        
        sendMessage({ type: 'OAUTH_AUTH_ERROR', error: msg + ': ' + desc });
      }

      var hash = window.location.hash;
      var search = window.location.search;
      
      var hashParams = new URLSearchParams(hash ? hash.substring(1) : '');
      var searchParams = new URLSearchParams(search ? search.substring(1) : '');

      var error = searchParams.get('error') || hashParams.get('error');
      var errorDesc = searchParams.get('error_description') || hashParams.get('error_description');

      if (error || errorDesc) {
        showError(error || 'Lỗi', errorDesc);
        return;
      }

      var code = searchParams.get('code');
      if (code) {
        statusEl.innerText = 'Xác thực thành công! Đang hoàn tất đăng nhập...';
        if (sendMessage({ type: 'OAUTH_CODE', code: code })) {
          setTimeout(function() { window.close(); }, 1500);
        } else {
          showError('Lỗi kết nối', 'Không thể gửi thông tin xác thực về cửa sổ chính.');
        }
        return;
      }

      var accessToken = hashParams.get('access_token');
      var refreshToken = hashParams.get('refresh_token');
      
      if (accessToken) {
        statusEl.innerText = 'Đăng nhập thành công! Đang chuyển hướng...';
        if (sendMessage({
          type: 'OAUTH_AUTH_SUCCESS',
          session: {
            access_token: accessToken,
            refresh_token: refreshToken
          }
        })) {
          setTimeout(function() { window.close(); }, 1000);
        } else {
          showError('Lỗi kết nối', 'Không thể gửi thông tin đăng nhập về cửa sổ chính.');
        }
      } else {
        // If we have neither code nor token, maybe it's just a refresh or a direct visit
        if (!window.opener && !search && !hash) {
          statusEl.innerText = 'Vui lòng quay lại tab gốc.';
          loaderEl.style.display = 'none';
          setTimeout(function() { window.location.href = '/'; }, 2000);
        } else {
          showError('Không tìm thấy thông tin đăng nhập', 'URL không chứa mã xác thực hợp lệ.');
        }
      }
    };
  </script>
</body>
</html>
